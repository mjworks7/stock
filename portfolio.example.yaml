# 보유 포트폴리오 예시 — 복사해서 portfolio.yaml 로 쓰세요.
#   python run.py monitor --file portfolio.example.yaml

base_currency: KRW      # 기준통화 (KRW 또는 USD). 비중/총액을 이 통화로 환산
cash: 1000000           # 보유 현금(기준통화). 선택

holdings:
  - ticker: "005930"    # 삼성전자 (국내: 6자리 코드는 따옴표 권장)
    shares: 50
    avg_price: 70000    # 평균 매수단가(원)
  - ticker: "000660"    # SK하이닉스
    shares: 5
    avg_price: 180000
  - ticker: AAPL        # 애플 (해외: 평단은 USD)
    shares: 20
    avg_price: 180
  - ticker: NVDA        # 엔비디아
    shares: 15
    avg_price: 120
